<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Shop</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>

<header id="siteHeader" hidden>

    <div class="logo">
        CYBER<span>SHOP</span>
    </div>

    <nav class="navMenu">
        <a href="#">Главная</a>
        <a href="#">Каталог</a>
        <a href="#">Компьютеры</a>
        <a href="#">Гаджеты</a>
        <a href="#">Аксессуары</a>
        <a href="#">Скидки</a>
    </nav>

    <div class="headerActions">
        <span id="headerUser"></span>
        <button id="headerLogoutBtn">Выйти</button>
    </div>

</header>

<!-- Регистрация -->

<section id="registerScreen">

    <h2>Регистрация</h2>

    <form id="registerForm">

        <div>
            <label>Имя:</label>
            <input type="text" id="registerName">
        </div>

        <div>
            <label>Почта:</label>
            <input type="text" id="registerEmail">
        </div>

        <div>
            <label>Пароль:</label>
            <input type="password" id="registerPassword">
        </div>

        <button type="submit">
            Зарегистрироваться
        </button>

    </form>

    <p id="registerError"></p>

    <button id="goToLoginBtn">
        У меня уже есть аккаунт
    </button>

</section>

<!-- Логин -->

<section id="loginScreen" hidden>

    <h2>Логин</h2>

    <form id="loginForm">

        <div>
            <label>Почта:</label>
            <input type="text" id="loginEmail">
        </div>

        <div>
            <label>Пароль:</label>
            <input type="password" id="loginPassword">
        </div>

        <button type="submit">
            Войти
        </button>

    </form>

    <p id="loginError"></p>

    <button id="goToRegisterBtn">
        Создать аккаунт
    </button>

</section>

<!-- Магазин -->

<section id="shopScreen" hidden>

    <h2>Магазин</h2>

    <p id="userInfo"></p>

    <button id="loadProductsBtn">
        Загрузить товары
    </button>

    <br><br>

    <input
        type="text"
        id="searchInput"
        placeholder="Поиск товаров..."
    >

    <p id="productError"></p>

    <h3>Товары</h3>

    <div id="productList"></div>

    <h3>Корзина</h3>

    <div id="cartList"></div>

    <p id="cartTotal"></p>

</section>

<!-- Pokemon Finder -->

<section id="pokemonSection" hidden>

    <h2>Pokémon Finder</h2>

    <input
        type="text"
        id="pokemonInput"
        placeholder="Введите имя покемона"
    >

    <button id="findPokemonBtn">
        Найти
    </button>

    <div id="pokemonCard"></div>

</section>

<script src="app.js"></script>

</body>
</html>

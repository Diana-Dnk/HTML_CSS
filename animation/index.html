<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ДЗ по CSS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div>
    <h2>Кнопки</h2>

    <button class="btn btn-1">Подробнее</button>
    <button class="btn btn-2">Купить</button>
    <button class="btn btn-3">Отправить</button>
  </div>

  <div>
    <h2>Карточки товара</h2>

    <div class="cards">
      <div class="card">
        <img src="https://i-store.net/_sh/73/7329.jpg" alt="Товар">
        <h3>Наушники</h3>
        <p>Стильные беспроводные наушники для музыки.</p>
        <span>29 990 ₸</span>
      </div>

      <div class="card">
        <img src="https://sanmi.kz/upload/iblock/0b4/2456534.jpg" alt="Товар">
        <h3>Смарт-часы</h3>
        <p>Удобные часы с отслеживанием активности.</p>
        <span>45 990 ₸</span>
      </div>
    </div>
</div>

  <div>
    <h2>Загрузка</h2>
    <div class="loader"></div>
  </div>


  <section class="hero">
    <div class="hero-content">
      <h1>Добро пожаловать в наш магазин</h1>
      <p>Лучшие товары по выгодным ценам</p>
      <button class="hero-btn">Смотреть товары</button>
    </div>
  </section>

</body>
</html>
